name: Feature Request
description: Suggest an idea for QARA
title: "[Feature]: "
labels: ["enhancement"]
projects: ["qara/1"]

body:
  - type: markdown
    attributes:
      value: Thanks for suggesting a feature!

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Is your feature request related to a problem? Please describe.
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Solution
      description: Describe the solution you'd like.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: What alternatives have you considered?

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - API
        - Frontend Dashboard
        - Chrome Extension
        - CLI Tool
        - Integrations
        - AI/ML Pipeline
        - RAG
        - Workflows
        - Docs

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or examples.
